<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Movie Watchlist</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="bg-light">

  <!-- Top navbar. Bootstrap's navbar auto-collapses into a hamburger on phones. -->
  <nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
      <span class="navbar-brand mb-0 h1">🎬 Movie Watchlist</span>
      <button id="logout-btn" class="btn btn-outline-light btn-sm">Log out</button>
    </div>
  </nav>

  <main class="container my-4">

    <!-- Row with the "Add movie" form on top, list below.
         On tablet+ screens, form and filter sit side-by-side. -->
    <div class="row g-3 mb-4">
      <div class="col-12 col-lg-7">
        <div class="card">
          <div class="card-body">
            <h2 class="h5 mb-3">Add a movie</h2>
            <form id="add-form" class="row g-2">
              <div class="col-12 col-sm-5">
                <input type="text" id="add-title" class="form-control" placeholder="Title" required />
              </div>
              <div class="col-12 col-sm-4">
                <input type="text" id="add-genre" class="form-control" placeholder="Genre" required />
              </div>
              <div class="col-8 col-sm-2">
                <input type="number" id="add-year" class="form-control" placeholder="Year" min="1880" max="2100" required />
              </div>
              <div class="col-4 col-sm-1 d-grid">
                <button type="submit" class="btn btn-success">Add</button>
              </div>
            </form>
          </div>
        </div>
      </div>

      <div class="col-12 col-lg-5">
        <div class="card h-100">
          <div class="card-body">
            <h2 class="h5 mb-3">Filter</h2>
            <select id="filter" class="form-select">
              <option value="">Show all</option>
              <option value="to-watch">To watch</option>
              <option value="watched">Watched</option>
            </select>
          </div>
        </div>
      </div>
    </div>

    <!-- Movie list. Rendered from JS. -->
    <div id="movie-list" class="row g-3"></div>

    <!-- Error banner. Hidden until something goes wrong. -->
    <div id="error" class="alert alert-danger mt-3 d-none"></div>
  </main>

  <!-- Edit modal (Bootstrap component). Opened by JS when you click "Edit". -->
  <div class="modal fade" id="edit-modal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Edit movie</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <form id="edit-form">
          <div class="modal-body">
            <input type="hidden" id="edit-id" />
            <div class="mb-3">
              <label class="form-label">Title</label>
              <input type="text" id="edit-title" class="form-control" required />
            </div>
            <div class="mb-3">
              <label class="form-label">Genre</label>
              <input type="text" id="edit-genre" class="form-control" required />
            </div>
            <div class="mb-3">
              <label class="form-label">Year</label>
              <input type="number" id="edit-year" class="form-control" min="1880" max="2100" required />
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" class="btn btn-primary">Save</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="app.js"></script>
  <script src="main.js"></script>
</body>
</html>
