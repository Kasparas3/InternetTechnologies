<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- This meta tag is what makes Bootstrap's responsive design actually work on mobile. -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Movie Watchlist</title>
  <!-- Bootstrap 5 from CDN: gives us a styled, responsive UI for free. -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="bg-light">
  <div class="container">
    <!-- col-12 on phone, col-md-6 on tablet+, col-lg-4 on desktop — this is responsive design. -->
    <div class="row justify-content-center align-items-center min-vh-100">
      <div class="col-12 col-md-6 col-lg-4">
        <div class="card shadow">
          <div class="card-body p-4">
            <h1 class="h3 mb-4 text-center">🎬 Movie Watchlist</h1>

            <form id="login-form">
              <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <input type="text" id="username" class="form-control" value="admin" required />
              </div>
              <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" id="password" class="form-control" value="admin123" required />
              </div>
              <button type="submit" class="btn btn-primary w-100">Log in</button>
            </form>

            <!-- Error messages appear here. Hidden by default (d-none = Bootstrap "display: none"). -->
            <div id="error" class="alert alert-danger mt-3 d-none"></div>

            <p class="text-muted small mt-3 mb-0 text-center">
              Default credentials: <code>admin</code> / <code>admin123</code>
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    // Wire up the login form. On success, save the JWT and redirect to the main page.
    document.getElementById('login-form').addEventListener('submit', async (event) => {
      event.preventDefault(); // stop the browser from reloading the page
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const errorBox = document.getElementById('error');
      errorBox.classList.add('d-none');

      try {
        const res = await fetch(`${API_BASE}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        if (!res.ok) {
          const data = await res.json().catch(() => ({}));
          throw new Error(data.error || 'Login failed');
        }
        const data = await res.json();
        localStorage.setItem('token', data.token);
        window.location.href = 'index.html';
      } catch (err) {
        errorBox.textContent = err.message;
        errorBox.classList.remove('d-none');
      }
    });
  </script>
</body>
</html>
